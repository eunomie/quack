# Copy to ~/.config/quack/config.toml and fill in.
# The token may instead come from the DISCORD_BOT_TOKEN env var (preferred).
dev_src_root   = "~/dev/src"
scratch_dir    = "~/dev/work"  # workspace for no-target "quick question" sessions; created if missing
state_dir      = "~/.local/state/quack"
clone_protocol = "ssh" # or "https"
default_agent  = "claude"
name_agent     = "claude"     # agent used to auto-name sessions (best summarizer)
# infer_agent = "claude"        # agent for the default fluent (natural-language) path (default: name_agent)
# infer_effort = "medium"       # effort for the infer one-shot; lower = faster (low|medium|high|xhigh)
# infer_history_limit = 20      # recent channel messages fed to the infer agent for context
# ask_timeout_minutes = 10      # how long a headless agent's ask_user question waits for your answer before it proceeds on its own
# Standing hints for the INFER agent only (not the working agent); used only to
# resolve targets/names — never invent a target when the request names none.
# infer_guidance = """
#   Repos are cloned under ~/dev/src. A bare "dagger" means dagger/dagger.
#   I mostly work on the eunomie/* and dagger/* owners.
#   """

[discord]
# token = "..." # prefer DISCORD_BOT_TOKEN env instead
# Two trust levels (see the [guest] block below and
# hack/designs/2026-06-05-multi-user-sandbox-hardening.md):
#
#   OWNER  — full host access. Identified by an explicit user id
#            (owner_user_id(s)). The legacy allowed_user_id(s) also count as
#            owners, so an existing single-user config is unchanged. By default an
#            owner runs unsandboxed; see trusted_channel_ids below to scope that.
#   GUEST  — confined to a per-session Docker sandbox (forced headless, repo
#            targets only, allow-listed egress). Identified by holding a
#            configured Discord role (guest_role_id(s)), within an allowed
#            guild/channel.
#
# A user who is neither an owner nor a guest-role holder is rejected. An empty
# owner list does NOT mean "any user" — owners must be listed explicitly.
#
# Interaction: a NON-sandboxed session is private to its creator — only the user
# who started it may talk to it (other users, even other owners, are ignored). A
# SANDBOXED session is shared — any authorized user may interact with it
# (multi-user).
allowed_user_id   = "YOUR_DISCORD_USER_ID"   # legacy: still treated as an OWNER
# owner_user_id   = "YOUR_DISCORD_USER_ID"   # full-access owner(s)
# owner_user_ids  = ["OWNER_1", "OWNER_2"]
allowed_guild_ids = ["YOUR_GUILD_ID", "ANOTHER_GUILD_ID"]
# allowed_channel_ids = ["OPTIONAL_CHANNEL_ID"]  # if set, the bot ignores every other channel (owners included)
# trusted_channel_ids = ["OWNER_CHANNEL_ID"]     # channels where the OWNER runs UNSANDBOXED by default.
#                                                # Must be within allowed_channel_ids (it gates first). Empty =>
#                                                # feature inert (owner unsandboxed everywhere, as before). When
#                                                # set, owners are sandboxed by default on every other channel.
# guest_role_id   = "GUEST_ROLE_ID"          # members of this role -> sandboxed guests
# guest_role_ids  = ["GUEST_ROLE_1", "GUEST_ROLE_2"]  # (sandbox is inert unless set)
thread_auto_archive_minutes = 10080 # Discord allows only 60, 1440, 4320, or 10080 (7 days)
# Messages in a tracked thread that start with one of these prefixes are treated
# as side-chat and never forwarded to the agent (no reaction). Replies to a
# non-bot user are likewise ignored. Default when unset: ["_ "]. Set to [] to
# disable prefix matching (the reply rule still applies).
ignore_prefixes = ["_ "]

[agents.claude]
command         = "claude"
effort_template = "--effort {effort}"
name_template   = "-n {name}"          # set the claude session display name
resume_template = "--resume {session}" # resume a session interactively (used by /attach)
default_effort  = "xhigh"              # used when the command gives no effort=
headless        = true                 # has a headless driver (headless is the default mode)
# switchable = true opts this agent in as a /claude mid-thread switch target,
# so in a tracked thread you can type /claude or /codex to hand the session off
# to it (the outgoing agent writes a handoff summary first).
switchable      = true
permission_mode = "auto"              # autonomous + auto-vetted (≈ codex on-request); also: acceptEdits | bypassPermissions
# allowed_tools = "Bash(git *),Read,Edit,Write"  # optional; with permission_mode=auto, leave unset to let auto govern
# settings = '{"sandbox":{"enabled":true,"autoAllowBashIfSandboxed":true,"network":{"allowedDomains":["*"]}}}'  # `claude --settings` passthrough (any claude setting). NOTE: enabling the OS sandbox breaks `git commit` inside worktrees — the shared .git lives outside the workspace and isn't writable — so it's left off; permission_mode=auto does the vetting.
# interactive_args = "--dangerously-skip-permissions"  # extra flags for interactive (no-headless) and /attach launches only — NOT headless (governed by permission_mode). Defaults to this for claude when unset; set to "" to disable, or to other flags to override.

[agents.codex]
command         = "codex"
effort_template = "--config model_reasoning_effort={effort}"
resume_template = "resume {session}"
headless        = true
# switchable = true opts this agent in as a /codex mid-thread switch target,
# so in a tracked thread you can type /claude or /codex to hand the session off
# to it (the outgoing agent writes a handoff summary first).
switchable      = true
# sandbox_mode  = "danger-full-access"  # codex `--sandbox` value for headless turns. Default (when unset) is danger-full-access — no codex sandbox, matching how claude is invoked — so worktree (shared .git lives outside the workspace) and multi-repo tasks aren't blocked. Tighten with "workspace-write" or "read-only" if you want codex to restrict itself; otherwise restrict at the quack level (the `!` explicit grammar / allowlist). Interactive (no-headless) codex defaults to --dangerously-bypass-approvals-and-sandbox via interactive_args; override with interactive_args = "..." (or "" to disable).

# Claude on its most powerful model (claude-fable-5). Selected with the bare
# `fable` keyword in the `!` grammar (e.g. `@quack ! fable owner/repo`), as a
# /fable mid-thread switch (switchable below), or when the fluent infer step
# routes a request that explicitly asks for fable. Same shape as [agents.claude]
# but pinned to the fable model. model is claude-only (codex ignores it).
[agents.fable]
command         = "claude"
model           = "claude-fable-5"
effort_template = "--effort {effort}"
name_template   = "-n {name}"
resume_template = "--resume {session}"
default_effort  = "xhigh"
headless        = true
switchable      = true
permission_mode = "auto"

# A dedicated agent for the fluent infer one-shot, on a faster model — point
# infer_agent at it (infer_agent = "infer") to speed up routing while the
# working agent keeps its own model. Needs headless = true so a driver is built;
# model is claude-only (codex ignores it). Keep effort_template so infer_effort applies.
# [agents.infer]
# command         = "claude"
# model           = "claude-haiku-4-5-20251001"
# effort_template = "--effort {effort}"
# headless        = true

# Fast commands: a trigger token quack execs DIRECTLY in a tracked session
# thread, skipping the agent — for pure launchers like revue/open-zed where the
# agent round-trip adds latency for no decision. The user's trailing words become
# arguments; the command runs in the session's worktree. Only fires inside an
# existing session thread, where the directory is unambiguous.
# [[fast_commands]]
# trigger = "/revue"
# argv    = ["/home/you/.claude/skills/revue/revue.sh"]
#
# [[fast_commands]]
# trigger = "/open-zed"
# argv    = ["/home/you/.claude/skills/open-zed/open-zed.sh"]

# Guest sandbox. Consulted for guest sessions, and also when an OWNER opts a
# single session into the jail with `@quack ! sandbox <owner/repo>` to dogfood
# the sandbox with their own account before exposing it to guests. Setting
# `github_pat` here is enough to enable the sandbox for that owner self-test —
# guest roles are NOT required (the feature is otherwise inert unless either
# [discord].guest_role_id(s) is set or this `github_pat` is configured). Guests
# run inside a per-session Docker sandbox: an unprivileged agent container (the
# clone + the creds below) plus a privileged docker:dind sidecar, on a private
# network whose only egress is the allow-listed proxy. Build the images first
# (see hack/sandbox/README.md): `docker build -t quack-sandbox:latest hack/sandbox`
# and `docker build -t quack-egress:latest hack/sandbox/proxy`.
# [guest]
# image          = "quack-sandbox:latest"   # agent container image
# proxy_image    = "quack-egress:latest"    # egress allow-list proxy image
# dind_image     = "docker:dind"            # docker-in-docker sidecar
# proxy_port     = "8888"
# Push credential: a FINE-GRAINED, revocable GitHub PAT (HTTPS; no SSH key ever
# enters the sandbox). Prefer the QUACK_GUEST_GITHUB_PAT env var over the file.
# github_pat     = "github_pat_..."
# git_user_name  = "Your Name"              # commit identity guests share
# git_user_email = "you@example.com"
# Network egress allow-list for the agent container (model API + GitHub + dagger).
# The default covers Anthropic/OpenAI/GitHub and dagger Cloud; override to
# tighten/extend.
# egress_allow   = ["api.anthropic.com", "api.openai.com", "github.com", "api.github.com", "codeload.github.com", "dl.dagger.io", "registry.dagger.io", "dagger.cloud", "api.dagger.cloud", "auth.dagger.cloud"]
# Shared credential files, "host:container". Each is COPIED into the sandbox
# (writable, so OAuth tokens can refresh) — NOT the whole ~/.claude/~/.codex,
# just the single auth file per tool. The agent image pre-installs `dagger`
# (its engine runs on the dind sidecar), so sharing ~/.config/dagger lets guest
# dagger runs land in your dagger Cloud org. Confirm exact paths for your install.
# cred_files = [
#   "/home/you/.claude/.credentials.json:/root/.claude/.credentials.json",
#   "/home/you/.codex/auth.json:/root/.codex/auth.json",
#   "/home/you/.config/dagger/credentials.json:/root/.config/dagger/credentials.json",
#   "/home/you/.config/dagger/org:/root/.config/dagger/org",
# ]
# Tool/skill limits applied to guests (claude only; codex has no skills). Block
# host-escaping skills, allow safe ones. Matched as Skill(<name>).
# disallowed_skills = ["open-zed"]
# allowed_skills    = ["revue"]
# allowed_tools     = ""                    # optional extra claude --allowedTools
# disallowed_tools  = ""                    # optional extra claude --disallowedTools
